<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Spa 5 Estrellas</title>
<link rel="stylesheet" href="styles.css">
</head>

<body>

<!-- INTRO -->
<div id="intro">
    <img src="imagenes/logo1.jpg" class="intro-img">
</div>

<div id="app" class="hidden">

<header>
    <img src="imagenes/logo.png" class="logo">
    <h1>Spa Luxury Experience</h1>
</header>

<!-- ESPECIAL -->
<section class="especial">
    <h2>Especial del Mes</h2>
    <h3>Ritual Premium</h3>

    <button class="btn agregar"
    onclick="openModal('Ritual Premium',3000,'imagenes/especial.jpg','Experiencia completa de relajación')">
    Agregar
    </button>

    <button class="btn detalle"
    onclick="openModal('Ritual Premium',5100,'imagenes/especial mayo.png','Experiencia completa de relajación')">
    Detalle
    </button>
</section>

<!-- CATEGORÍAS -->
<section id="categorias" class="menu"></section>

<!-- SERVICIOS -->
<section id="servicios" class="servicios"></section>

<!-- CARRITO -->
<section class="carrito">
<h2>Tu experiencia</h2>

<ul id="cart"></ul>
<p>Total: $<span id="total">0</span></p>

<!-- CERTIFICADO -->
<div class="certificado">
<h3>Certificado abierto</h3>

<input id="certificadoCantidad" type="number" placeholder="Monto">

<div>
<button onclick="setCert(2600)">$2600</button>
<button onclick="setCert(3000)">$3000</button>
<button onclick="setCert(7800)">$7800</button>
</div>

<button onclick="addCertificate()">Agregar certificado</button>
</div>

<!-- FORM -->
<form>

<input id="nombre" placeholder="Nombre">
<input id="destinatario" placeholder="Destinatario">
<input id="telefono" placeholder="Teléfono">
<input id="correo" placeholder="Correo">

<select id="tipOption" onchange="toggleTip()">
<option value="no">Sin propina</option>
<option value="si">Agregar propina</option>
</select>

<input id="tipAmount" placeholder="Monto propina" style="display:none">

<button type="button" onclick="sendWhatsApp()">Solicitar link de pago</button>

</form>

<p class="nota">
IVA 16% + servicio 15%. Propina opcional.
</p>

</section>

</div>

<!-- MODAL SERVICIO -->
<div class="modal" id="modalServicio">
<div class="modal-content">

<img id="modalImg">
<h2 id="modalTitle"></h2>
<p id="modalDesc"></p>
<p id="modalPrice"></p>

<button onclick="addFromModal()">Agregar</button>
<button onclick="closeModal()">Cerrar</button>

</div>
</div>

<!-- MODAL MEJORAS -->
<div class="modal" id="modalMejoras">
<div class="modal-content mejoras-modal">

<h2>Mejora tu experiencia</h2>
<p class="subtitulo">Recomendado para ti</p>

<div id="opcionesMejoras" class="mejoras-grid"></div>

<button onclick="cerrarMejoras()">Continuar</button>

</div>
</div>

<script src="script.js"></script>
</body>
</html>
