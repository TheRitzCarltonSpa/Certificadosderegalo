<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Spa Premium</title>
<link rel="stylesheet" href="styles.css">
</head>

<body>

<!-- 🔵 1. PANTALLA DE INICIO -->
<div id="splash">
    <!-- 🔧 CAMBIAR LOGO -->
    <img src="imagenes/logo.png" alt="Logo Spa">
</div>

<!-- 🔝 HEADER -->
<header>
    <!-- 🔧 CAMBIAR LOGO SUPERIOR -->
    <img src="imagenes/logo1.png" class="logo-top">
</header>

<!-- 🌟 ESPECIAL DEL MES -->
<section class="especial">
    <!-- 🔧 CAMBIAR IMAGEN DE FONDO -->
    <div class="especial-card" style="background-image:url('especial.jpg')">
        <h2>Especial del Mes</h2>
        <button onclick="addToCart('Especial del Mes', 5100)">Agregar</button>
        <button onclick="openDetail('Especial premium relajante')">Detalle</button>
    </div>
</section>

<!-- 🧴 CATEGORÍAS -->
<section id="categorias"></section>

<!-- 🎁 CERTIFICADOS -->
<section class="certificados">
    <div class="cert-card">
        <!-- 🔧 CAMBIAR IMAGEN -->
        <div class="cert-bg" style="background-image:url('alberca.jpg')"></div>

        <h3>Certificado de Regalo</h3>

        <!-- 🔧 OPCIONES -->
        <select id="certValue">
            <option value="1000">$1000</option>
            <option value="2000">$2000</option>
            <option value="3000">$3000</option>
        </select>

        <input type="number" id="certQty" placeholder="Cantidad">

        <button onclick="addCertificate()">Agregar</button>
    </div>
</section>

<!-- 🛒 CARRITO -->
<section class="carrito">
    <h2>Carrito</h2>
    <div id="cart"></div>
    <h3 id="total">Total: $0</h3>
</section>

<!-- 📋 FORMULARIO -->
<section class="formulario">
    <h2>Datos</h2>

    <input id="nombre" placeholder="Nombre">
    <input id="destinatario" placeholder="Destinatario">
    <input id="correo" placeholder="Correo">
    <input id="telefono" placeholder="Teléfono">

    <label>¿Agregar propina?</label>
    <select id="tipOption" onchange="toggleTip()">
        <option>No</option>
        <option>Si</option>
    </select>

    <input id="tipAmount" placeholder="Cantidad propina" style="display:none">

    <button onclick="sendWhatsApp()">Solicitar link de pago</button>
</section>

<!-- 🌑 MODAL DETALLE -->
<div id="modal" class="modal">
    <div class="modal-content">
        <span onclick="closeModal()">X</span>
        <p id="modalText"></p>
    </div>
</div>

<!-- 💎 MODAL MEJORAS -->
<div id="upgradeModal" class="modal">
    <div class="modal-content">
        <h3>Mejoras</h3>
        <div id="upgradeOptions"></div>
        <button onclick="closeUpgrade()">Sin mejoras</button>
    </div>
</div>

<script src="script.js"></script>
</body>
</html>
