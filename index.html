<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Spa 5 Estrellas</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

<header>
    <img src="images/logo.png" class="logo">
    <h1>Especial del Mes</h1>
</header>

<section class="especial">
    <div class="especial-content">
        <h2>Relajación Total</h2>
        <button class="btn-agregar" onclick="addToCart('Especial Relajación', 1200)">Agregar</button>
        <button class="btn-detalles" onclick="showEspecial()">Detalles</button>
    </div>
</section>

<!-- Categorías -->
<section class="categorias" id="categorias"></section>

<!-- Certificado -->
<section class="certificado">
    <h2>Certificado de Regalo</h2>
    <input type="number" id="certificadoCantidad" placeholder="Cantidad">
    <div>
        <button onclick="setCert(1000)">$1000</button>
        <button onclick="setCert(2000)">$2000</button>
        <button onclick="setCert(5000)">$5000</button>
    </div>
</section>

<!-- Carrito -->
<section class="carrito">
    <h2>Carrito</h2>
    <ul id="cart"></ul>
    <h3>Total: $<span id="total">0</span></h3>
</section>

<!-- Propina -->
<section class="propina">
    <h3>¿Desea agregar propina?</h3>
    <select id="tipOption" onchange="toggleTip()">
        <option value="no">No</option>
        <option value="si">Sí</option>
    </select>
    <input type="number" id="tipAmount" placeholder="Cantidad o %" style="display:none;">
</section>

<!-- Formulario -->
<section class="formulario">
    <input id="nombre" placeholder="Nombre">
    <input id="destinatario" placeholder="Destinatario">
    <input id="correo" placeholder="Correo">
    <input id="telefono" placeholder="Teléfono">
    
    <button onclick="sendWhatsApp()">Solicitar link de pago</button>

    <p class="nota">
        Todos los tratamientos incluyen I.V.A 16% y cargo por servicio 15%, la propina es opcional.
    </p>
</section>

<script src="script.js"></script>
</body>
</html>
