<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Certificados Spa</title>
<link rel="stylesheet" href="styles.css">
</head>

<body>
  
<!-- INTRO -->
  
<div id="intro">  
<img src="imagenes/logo1.png">
<div class="intro-logo"></div>
</div>
  
<header>
<div class="logo">  
<img src="imagenes/logo.png" style="max-width:120px;height:auto;">
</div>  
<h1>Certificados de regalo Spa</h1>  
</header>
  
<div class="especial">
<h2>Especial del Mes</h2>  
<h3>Mothers radiance experince</h3>
  
<button class="boton boton-dorado" onclick="agregar('Mothers radiance experince',5100)">  
Agregar  
</button> 

<button class="boton boton-detalle" onclick="detalle('Mothers radiance experince','Un ritual luminoso diseñado para restaurar y revitalizar. El cuidado profundo y el toque nutritivo se unen para realzar la luminosidad natural, liberar el cansancio y regalar un momento de bienestar absoluto.')">
Detalle
</button>
</div>

<!-- MENU -->
<div class="menu">

<div class="categoria" onclick="mostrar('bienestar')"> 
<img src="imagenes/bienestar.jpg">
<h3>Bienestar</h3>
</div>

<div class="categoria" onclick="mostrar('masajes')">  
<img src="imagenes/masajes.jpg">  
<h3>Masajes</h3> 
</div>

<div class="categoria" onclick="mostrar('faciales')">  
<img src="imagenes/facial.jpg">  
<h3>Faciales</h3> 
</div>
  
<div class="categoria" onclick="mostrar('corporales')">  
<img src="imagenes/corporales.jpg">  
<h3>Corporales</h3>
</div>
  
<div class="categoria" onclick="mostrar('mejoras')">  
<img src="https://images.unsplash.com/photo-1600334129128-685c5582fd35">  
<h3>Mejoras</h3>
</div>

</div>  

<div class="servicios" id="servicios"></div>
  
<!-- CARRITO --> 
<div class="carrito">

<h2>Servicios elegidos</h2>
<div id="lista"></div>

<div class="total">  
Total: $<span id="total">0</span>  
</div>
  
<!-- CERTIFICADO CON VALOR -->
  
<div class="especial">
  
<h2>Certificado con valor</h2>
  
<input type="number" id="valorCertificado" placeholder="Ejemplo 3000">
<div>

<button class="boton boton-agregar" onclick="seleccionarValor(2400)">$2,400</button>  
<button class="boton boton-agregar" onclick="seleccionarValor(3600)">$3,600</button>  
<button class="boton boton-agregar" onclick="seleccionarValor(7600)">$7,600</button>  
</div>
  
<button class="boton boton-agregar" onclick="agregarCertificado()">Agregar certificado</button>
</div>
  
<form>
  
<input id="nombre" type="text" placeholder="Nombre">  
<input id="destinatario" type="text" placeholder="Destinatario">  
<input id="telefono" type="tel" placeholder="Teléfono">  
<input id="correo" type="email" placeholder="Correo">

<div>  
<label>¿Desea incluir propina?</label>
  
<label>
<input type="radio" name="propina" onclick="togglePropina(true)"> Sí
</label>

<label>
<input type="radio" name="propina" onclick="togglePropina(false)"> No
</label>

<div id="montoPropina" style="display:none;">  
<input id="propinaMonto" placeholder="Monto">  
</div> 
  
</div> 
  
<button type="button" class="boton boton-agregar" onclick="enviar()">
Solicitar link
</button>

</form>

<p class="nota-legal">
Todos los tratamientos incluyen I.V.A (16%) y cargo por servicio (15%), la propina es opcional.  
</p>
  
</div>
  
<!-- MODAL -->
<div class="modal" id="modal">  
<div class="modal-contenido">
<h2 id="titulo"></h2>  
<p id="descripcion"></p>
<button class="boton boton-detalle" onclick="cerrar()">Cerrar</button>  
</div> 
</div>
  
<!-- MODAL MEJORAS -->
<div class="modal" id="modalMejoras">  
<div class="modal-contenido">  
<h2 id="tituloMejoras"></h2>
<div id="opcionesMejoras"></div>  
<button class="boton boton-agregar" onclick="cerrarMejoras()">Continuar</button>  
</div>  
</div>
  
<script src="script.js"></script>
  
</body>  
</html>
