<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Spa Premium 5 Estrellas</title>
<link rel="stylesheet" href="styles.css">
</head>

<body>

<header class="header">
    <img src="assets/logo.png" class="logo">
</header>

<section class="especial">
    <h2>Especial del Mes</h2>
    <div class="especial-card">
        <button onclick="verDetalle('especial')">Ver Detalle</button>
        <button onclick="agregarCarrito('Especial del Mes', 1200)">Agregar</button>
    </div>
</section>

<section class="categorias">
    <h2>Categorías</h2>
    <div class="cards">
        <div class="card" onclick="mostrarTratamientos('relajacion')">Relajación</div>
        <div class="card" onclick="mostrarTratamientos('facial')">Facial</div>
    </div>
</section>

<section id="tratamientos"></section>

<section class="certificados">
    <h2>Certificados</h2>
    <div class="cert-card">
        <button onclick="agregarCarrito('Certificado $1000',1000)">$1000</button>
        <button onclick="agregarCarrito('Certificado $2000',2000)">$2000</button>
        <button onclick="agregarCarrito('Certificado $3000',3000)">$3000</button>
    </div>
</section>

<section class="carrito">
    <h2>Carrito</h2>
    <ul id="listaCarrito"></ul>
    <h3>Total: $<span id="total">0</span></h3>
</section>

<section class="formulario">
    <h2>Datos</h2>
    <input type="text" id="nombre" placeholder="Nombre">
    <input type="text" id="destinatario" placeholder="Destinatario">
    <input type="email" id="correo" placeholder="Correo">
    <input type="tel" id="telefono" placeholder="Telefono">

    <label>¿Desea agregar propina?</label>
    <select id="propina">
        <option value="0">No</option>
        <option value="10">Sí (10%)</option>
    </select>

    <button onclick="enviarWhatsApp()">Solicitar link de pago</button>
</section>

<!-- Modal -->
<div id="modal" class="modal">
    <div class="modal-content">
        <span onclick="cerrarModal()">X</span>
        <p>Opciones de mejora</p>
        <button onclick="agregarCarrito('Aromaterapia',200)">Aromaterapia</button>
        <button onclick="agregarCarrito('Piedras calientes',300)">Piedras</button>
        <button onclick="cerrarModal()">Sin mejoras</button>
    </div>
</div>

<script src="script.js"></script>
</body>
</html>
