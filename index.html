<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Certificados de regalo</title>
<link rel="stylesheet" href="styles.css">
</head>

<body>

<!-- INTRO -->
<div id="intro">
    <img src="imagenes/logo1.png" class="intro-logo">
</div>
</div>

<div id="app" class="hidden">

<header>
    <div class="logo">
    <img src="imagenes/logo.png" style="max-width:120px;height:auto;">
    </div>
    <h1>Certificados de regalo</h1>
</header>

<!-- ESPECIAL -->
<section class="especial">
    <div class="overlay">
        <h2>Relajación Total</h2>
        <button class="btn luxury" onclick="addToCart('Especial Relajación',1200)">Agregar</button>
        <button class="btn luxury secondary" onclick="showEspecial()">Detalles</button>
    </div>
</section>

<!-- CATEGORÍAS -->
<section class="categorias" id="categorias"></section>

<!-- SERVICIOS DINÁMICOS -->
<section class="servicios" id="servicios"></section>

<!-- CERTIFICADO -->
<section class="certificado">
    <div class="certificado-bg">
        <h2>Certificado de Regalo</h2>
        <input type="number" id="certificadoCantidad" placeholder="Cantidad">
        <div>
            <button class="btn luxury" onclick="setCert(2400)">$2400</button>
            <button class="btn luxury" onclick="setCert(3600)">$3600</button>
            <button class="btn luxury" onclick="setCert(7600)">$7600</button>
        </div>
    </div>
</section>

<!-- MODAL -->
<div id="modalEspecial" class="modal">
    <img id="imgEspecial" src="imagenes/especial.jpg">
</div>

<!-- CARRITO -->
<section class="carrito">
    <h2>Carrito</h2>
    <ul id="cart"></ul>
    <h3>Total: $<span id="total">0</span></h3>
</section>

<!-- FORM -->
<section class="formulario">
    <input id="nombre" placeholder="Nombre">
    <input id="destinatario" placeholder="Destinatario">
    <input id="correo" placeholder="Correo">
    <input id="telefono" placeholder="Teléfono">

    <select id="tipOption" onchange="toggleTip()">
        <option value="no">Sin propina</option>
        <option value="si">Agregar propina</option>
    </select>

    <input id="tipAmount" placeholder="Cantidad" style="display:none;">

    <button class="btn luxury" onclick="sendWhatsApp()">Solicitar link de pago</button>

    <p class="nota">
        Todos los tratamientos incluyen I.V.A 16% y cargo por servicio 15%, la propina es opcional.
    </p>
</section>

</div>

<script src="script.js"></script>
</body>
</html>
