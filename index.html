<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Spa 5 Estrellas</title>
<link rel="stylesheet" href="styles.css">
</head>

<body>

<!-- ================= INTRO ================= -->
<div id="intro">
    <img src="images/logo1.png" style="width:120px;">
    <div class="intro-logo">SPA EXPERIENCE</div>
</div>

<!-- ================= APP ================= -->
<div id="app" class="hidden">

<header>
    <div class="logo">
        <img src="images/logo.png">
    </div>
    <h1>Certificados de regalo Spa</h1>
</header>

<!-- ================= ESPECIAL ================= -->
<div class="especial">
    <h2>Especial del Mes</h2>
    <h3>Semana de poder</h3>

    <button class="btn agregar"
    onclick="openModal(
    'Semana de poder',
    1200,
    'images/especial.jpg',
    'Agenda 2 faciales en marzo y recibe 50% de descuento en el tercero'
    )">
    Ver detalle
    </button>
</div>

<!-- ================= CATEGORÍAS DINÁMICAS ================= -->
<div id="categorias"></div>

<!-- ================= SERVICIOS ================= -->
<div id="servicios"></div>

<!-- ================= CARRITO ================= -->
<div class="carrito">

    <h2>Servicios elegidos</h2>

    <ul id="cart"></ul>

    <h3>Total: $<span id="total">0</span></h3>

</div>

<!-- ================= CERTIFICADO ================= -->
<div class="certificado">

    <h2>Certificado con valor</h2>

    <input type="number" id="certificadoCantidad" placeholder="Ejemplo 3000">

    <div>
        <button class="boton-mejora" onclick="setCert(1500)">$1,500</button>
        <button class="boton-mejora" onclick="setCert(3000)">$3,000</button>
        <button class="boton-mejora" onclick="setCert(5000)">$5,000</button>
    </div>
    
<button class="boton-dorado" onclick="agregarCertificadoDirecto()">
Agregar al carrito
</button>
</div>

<!-- ================= FORMULARIO ================= -->
<form>

    <input id="nombre" placeholder="Nombre">
    <input id="destinatario" placeholder="Destinatario">
    <input id="correo" placeholder="Correo electrónico">
    <input id="telefono" placeholder="Teléfono">

    <!-- PROPINA -->
    <div>
        <label>¿Desea agregar propina?</label>

        <select id="tipOption" onchange="toggleTip()">
            <option value="no">No</option>
            <option value="si">Sí</option>
        </select>

        <input id="tipAmount" type="number" placeholder="Monto o %" style="display:none;">
    </div>

    <button type="button" class="boton-mejora" onclick="sendWhatsApp()">
        Solicitar link de pago
    </button>

</form>

<p class="nota-legal">
Todos los tratamientos incluyen I.V.A 16% y cargo por servicio 15%. La propina es opcional.
</p>

</div>

<!-- ================= MODAL SERVICIO ================= -->
<div class="modal" id="modalServicio">
    <div class="modal-content">

        <img id="modalImg">

        <h2 id="modalTitle"></h2>
        <p id="modalDesc"></p>
        <p id="modalPrice"></p>

        <button class="boton-mejora" onclick="addFromModal()">
            Agregar al carrito
        </button>

        <button class="btn detalle" onclick="closeModal()">
            Cerrar
        </button>

    </div>
</div>

<!-- ================= MODAL MEJORAS ================= -->
<div class="modal" id="modalMejoras">
    <div class="modal-content">

        <h2 id="tituloMejoras">Mejora tu experiencia</h2>

        <div id="opcionesMejoras"></div>

        <button class="btn detalle" onclick="cerrarMejoras()">
            Continuar sin mejora
        </button>

    </div>
</div>

<script src="script.js"></script>

</body>
</html>
