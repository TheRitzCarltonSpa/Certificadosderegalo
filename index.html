<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Spa Premium</title>
<link rel="stylesheet" href="styles.css">
</head>

<body>

<!-- 🔵 SPLASH -->
<div id="splash">
    <!-- 🔧 CAMBIAR LOGO -->
    <img src="imagenes/logo.png" alt="Logo">
</div>

<!-- 🧠 APP -->
<div id="app" class="hidden">

<header>
    <!-- 🔧 CAMBIAR LOGO SUPERIOR -->
    <img src="imagenes/logo1.png" class="logo-top">
</header>

<!-- 🌟 ESPECIAL DEL MES -->
<section class="especial">
    <div class="especial-card" style="background-image:url('imagenes/especial.jpg')">
        <h2>Especial del Mes</h2>

        <!-- 🔧 BOTÓN AGREGAR -->
        <button onclick="addToCart('Especial del Mes',1200)">Agregar</button>

        <!-- 🔥 NUEVO: DETALLE CON IMAGEN -->
        <button onclick="openDetail('Experiencia premium relajante','imagenes/especial mayo.png')">
        Detalle
        </button>
    </div>
</section>

<!-- 🧴 CATEGORÍAS -->
<section id="categorias" class="categorias-container"></section>

<!-- 🎁 CERTIFICADO -->
<section class="certificados">
    <div class="cert-card">

        <!-- 🔧 CAMBIAR IMAGEN -->
        <div class="cert-bg" style="background-image:url('imagenes/alberca.jpg')"></div>

        <h3>Certificado</h3>

        <!-- 💎 CERTIFICADO PREMIUM -->
<div class="cert-options">

    <button onclick="addCertificateQuick(2600)">
        $2600
    </button>

    <button onclick="addCertificateQuick(3800)">
        $3800
    </button>

    <button onclick="addCertificateQuick(7900)">
        $7900
    </button>

</div>

<!-- 🛒 CARRITO -->
<section class="carrito">
    <h2>Carrito</h2>
    <div id="cart"></div>

    <div class="total-box">
        <h3 id="total">Total: $0</h3>
    </div>
</section>

<!-- 📋 FORMULARIO -->
<section class="formulario">
    <h2>Datos</h2>

    <input id="nombre" placeholder="Nombre">
    <input id="destinatario" placeholder="Destinatario">
    <input id="correo" placeholder="Correo">
    <input id="telefono" placeholder="Teléfono">

    <label>¿Agregar propina?</label>
    <select id="tipOption" onchange="toggleTip()">
        <option>No</option>
        <option>Si</option>
    </select>

    <input id="tipAmount" placeholder="Propina" style="display:none">

    <button onclick="sendWhatsApp()">Solicitar link de pago</button>
</section>

</div>

<!-- 🌑 MODAL DETALLE (ACTUALIZADO CON IMAGEN) -->
<div id="modal" class="modal">
    <div class="modal-content">

        <span onclick="closeModal()">X</span>

        <!-- 🔥 NUEVO: IMAGEN DINÁMICA -->
        <div id="modalImage" class="modal-img"></div>

        <!-- TEXTO -->
        <p id="modalText"></p>

    </div>
</div>

<!-- 💎 MODAL MEJORAS -->
<div id="upgradeModal" class="modal">
    <div class="modal-content">
        <h3>Mejoras</h3>
        <div id="upgradeOptions"></div>
        <button onclick="closeUpgrade()">Sin mejoras</button>
    </div>
</div>

<!-- 💡 MODAL RECOMENDACIONES -->
<div id="recommendModal" class="modal">
    <div class="modal-content">
        <h3>✨ Recomendado para mejorar tu experiencia</h3>
        <div id="recommendOptions"></div>
        <button onclick="closeRecommend()">Continuar sin agregar</button>
    </div>
</div>

<script src="script.js"></script>
</body>
</html>
