<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Certificads de regalo</title>
<link rel="stylesheet" href="styles.css">
</head>

<body>

<!-- INTRO -->
<div id="intro">
    <img src="imagenes/logo1.png" class="intro-img" loading="lazy">
</div>

<header>
<div class="logo">
<img src="imagenes/logo.png" class="logo-img" loading="lazy">
</div>
<h1>Certificados de regalo Spa</h1>
</header>

<!-- ESPECIAL -->
<div class="especial">
<h2>Especial del Mes</h2>
<h3>Mothers Resilence ritual</h3>

<button class="boton-dorado" onclick="agregar('Semana de poder',0)">
Agregar
</button>

<button class="detalle" onclick="detalleEspecial()">
Detalle
</button>
</div>

<!-- CATEGORÍAS -->
<div class="menu">

<div class="categoria" onclick="mostrar('bienestar')">
<img src="imagenes/bienestar.jpg" loading="lazy">
<h3>Bienestar</h3>
</div>

<div class="categoria" onclick="mostrar('masajes')">
<img src="imagenes/masajes.jpg" loading="lazy">
<h3>Masajes</h3>
</div>

<div class="categoria" onclick="mostrar('faciales')">
<img src="imagenes/facial.jpg" loading="lazy">
<h3>Faciales</h3>
</div>

<div class="categoria" onclick="mostrar('corporales')">
<img src="imagenes/corporales.jpg" loading="lazy">
<h3>Corporales</h3>
</div>

<div class="categoria" onclick="mostrar('mejoras')">
<img src="imagenes/mejoras.jpg" loading="lazy">
<h3>Mejoras</h3>
</div>

</div>

<div id="servicios" class="servicios"></div>

<!-- CARRITO -->
<div class="carrito">

<h2>Servicios elegidos</h2>
<div id="lista"></div>

<h3>Total: $<span id="total">0</span></h3>

<!-- CERTIFICADO -->
<div class="especial certificado">
<h2>Certificado con valor</h2>

<input type="number" id="valorCertificado" placeholder="Ejemplo 3000">

<div>
<button onclick="seleccionarValor(1500)">$1,500</button>
<button onclick="seleccionarValor(3000)">$3,000</button>
<button onclick="seleccionarValor(5000)">$5,000</button>
</div>

<button onclick="agregarCertificado()">Agregar certificado</button>
</div>

<!-- FORMULARIO -->
<form>

<input id="nombre" placeholder="Nombre">
<input id="destinatario" placeholder="Destinatario">
<input id="telefono" placeholder="Teléfono">
<input id="correo" placeholder="Correo">

<div>
<label>¿Desea incluir propina?</label>
<label><input type="radio" name="propina" value="si" onclick="togglePropina(true)"> Sí</label>
<label><input type="radio" name="propina" value="no" onclick="togglePropina(false)"> No</label>
</div>

<div id="montoPropina" style="display:none;">
<input type="number" id="propinaMonto" placeholder="Monto">
</div>

<button type="button" onclick="enviar()">Solicitar link de pago</button>

</form>

<p class="nota-legal">
Todos los tratamientos incluyen IVA 16% y servicio 15%. Propina opcional.
</p>

</div>

<!-- MODAL DETALLE -->
<div class="modal" id="modal">
<div class="modal-contenido">

<h2 id="titulo"></h2>

<img id="modalImg" style="width:100%; display:none; border-radius:10px;">

<p id="descripcion"></p>

<button onclick="cerrar()">Cerrar</button>

</div>
</div>

<!-- MODAL MEJORAS -->
<div class="modal" id="modalMejoras">
<div class="modal-contenido mejoras-modal">

<h2 id="tituloMejoras">Mejora tu experiencia</h2>
<div id="opcionesMejoras" class="mejoras-grid"></div>

<button onclick="cerrarMejoras()">Continuar</button>

</div>
</div>

<script src="script.js"></script>
</body>
</html>
